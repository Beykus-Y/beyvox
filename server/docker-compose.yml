services:
  postgres:
    image: postgres:16-alpine
    container_name: beyvox-server-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: beyvox_server
      POSTGRES_USER: beyvox
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyvox -d beyvox_server"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # LiveKit SFU — host networking обязателен для корректной работы WebRTC/TURN.
  # Биндится напрямую на IP хоста без Docker NAT (иначе ICE кандидаты некорректны).
  # Конфиг: скопируй livekit.yaml.example → livekit.yaml и подставь свои значения.
  livekit:
    image: livekit/livekit-server:latest
    container_name: beyvox-livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    network_mode: host

  server:
    image: ghcr.io/beykus-y/beyvox-server:main
    # build: .   # раскомментируй для локальной сборки
    container_name: beyvox-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://beyvox:${DB_PASSWORD:-changeme}@postgres:5432/beyvox_server
      HOST: 0.0.0.0
      PORT: 8080
      CENTRAL_URL: ${CENTRAL_URL:-https://beyvox.beykus.fun}
      # Локально: ws://localhost:7880 | Продакшн с Caddy: wss://live.your-domain.com
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret_at_least_32_chars_long!!}
      CATALOG_REGISTER: ${CATALOG_REGISTER:-false}
      SERVER_NAME: ${SERVER_NAME:-My BeyVox Server}
      SERVER_ADDRESS: ${SERVER_ADDRESS:-localhost:8080}
      OWNER_USERNAME: ${OWNER_USERNAME:-admin}
      RUST_LOG: ${RUST_LOG:-beyvox_server=info}
    ports:
      - "${PORT:-8080}:8080"
    networks:
      - internal
      - beyvox-proxy

volumes:
  postgres_data:

networks:
  internal:
  beyvox-proxy:
    external: true
